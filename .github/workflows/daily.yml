name: Kyber Digest — denní generování

on:
  schedule:
    # 7:00 UTC = 8:00 SEČ (zimní čas) / 9:00 SELČ (letní čas)
    # Spouštíme jen Po–Pá; víkendy a státní svátky ošetřuje check_workday.py
    - cron: '0 7 * * 1-5'
  workflow_dispatch:          # umožňuje ruční spuštění z GitHub UI

permissions:
  contents: write             # potřebujeme pro git push

jobs:
  generate-digest:
    name: Vygeneruj a publikuj digest
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repozitáře
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # celá historie pro git log

      # -----------------------------------------------------------------------
      # 2. Nastavení Pythonu
      # -----------------------------------------------------------------------
      - name: Nastavení Pythonu 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # -----------------------------------------------------------------------
      # 3. Instalace závislostí
      # -----------------------------------------------------------------------
      - name: Instalace závislostí
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Kontrola pracovního dne (víkendy + státní svátky → skip)
      # -----------------------------------------------------------------------
      - name: Kontrola pracovního dne
        id: workday
        run: |
          OUTPUT=$(python scripts/check_workday.py)
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "[INFO] Výstup check_workday: $OUTPUT"

      # -----------------------------------------------------------------------
      # 5. Scraping — stáhne články od posledního spuštění (nebo 32 h zpět)
      # -----------------------------------------------------------------------
      - name: Scraping zdrojů
        if: steps.workday.outputs.skip != 'true'
        run: |
          LAST_RUN=""
          if [ -f docs/last_run.txt ]; then
            LAST_RUN=$(cat docs/last_run.txt)
          fi
          LAST_RUN_TS="$LAST_RUN" python scripts/scraper.py > /tmp/articles.json

      # -----------------------------------------------------------------------
      # 6. Summarizace — Gemini API
      # -----------------------------------------------------------------------
      - name: Summarizace (Gemini)
        if: steps.workday.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/summarizer.py /tmp/articles.json > /tmp/summary.md

      # -----------------------------------------------------------------------
      # 7. Generování HTML webu
      # -----------------------------------------------------------------------
      - name: Generování webu (docs/)
        if: steps.workday.outputs.skip != 'true'
        run: python scripts/build_web.py /tmp/summary.md

      # -----------------------------------------------------------------------
      # 8. Odeslání emailu
      # -----------------------------------------------------------------------
      - name: Odeslání emailu
        if: steps.workday.outputs.skip != 'true'
        env:
          BREVO_SMTP_USER:     ${{ secrets.BREVO_SMTP_USER }}
          BREVO_SMTP_PASSWORD: ${{ secrets.BREVO_SMTP_PASSWORD }}
          EMAIL_FROM:          ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:            ${{ secrets.EMAIL_TO }}
        run: python scripts/mailer.py /tmp/summary.md

      # -----------------------------------------------------------------------
      # 9. Commit a push vygenerovaných souborů
      # -----------------------------------------------------------------------
      - name: Commit a push docs/
        if: steps.workday.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ulož čas tohoto spuštění pro příští run
          date -u +%Y-%m-%dT%H:%M:%SZ > docs/last_run.txt
          git add docs/
          TODAY=$(date +%Y-%m-%d)
          git diff --cached --quiet && echo "Žádné změny k commitování." || \
            git commit -m "digest: ${TODAY}"
          git pull --rebase origin main
          git push
